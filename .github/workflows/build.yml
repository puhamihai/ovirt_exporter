on:
  push:
    branches:
      - main

name: Build

jobs:
  build:
    name: Build and publish dev binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build linux/amd64 binary
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ovirt_exporter .

      - name: Package binary
        run: tar -czf ovirt_exporter_dev_linux_amd64.tar.gz ovirt_exporter

      - name: Publish dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development build
          prerelease: true
          files: ovirt_exporter_dev_linux_amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
